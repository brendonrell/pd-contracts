[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "solady/=lib/solady/src/",
    "forge-std/=lib/forge-std/src/"
]

fs_permissions = [{ access = "read", path = "./"}]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
